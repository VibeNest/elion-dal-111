services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"   # REST/HTTP
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: elion
      POSTGRES_PASSWORD: elion
      POSTGRES_DB: elion
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elion -d elion"]
      interval: 10s
      timeout: 5s
      retries: 5

  elion-dal:
    build: .
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      GRPC_HOST: 0.0.0.0
      GRPC_PORT: 50051
      QDRANT_URL: http://qdrant:6333
      PG_DSN: postgresql+psycopg://elion:elion@postgres:5432/elion
      EMBEDDING_BACKEND: fastembed
    ports:
      - "50051:50051"   # gRPC
      - "8080:8080"     # веб-админка
    profiles: ["full"]   # `docker compose --profile full up` поднимет и сервис

volumes:
  qdrant_storage:
  pgdata:
