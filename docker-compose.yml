services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    volumes:
    - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
    - "6333"
    - "6334"
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: elion
      POSTGRES_PASSWORD: elion
      POSTGRES_DB: elion
    volumes:
    - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elion -d elion"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
    - "5432"
  elion-dal:
    build: .
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      QDRANT_URL: http://qdrant:6333
      PG_DSN: postgresql+psycopg://elion:elion@postgres:5432/elion
      EMBEDDING_BACKEND: st-bm25
      EMBEDDING_MODEL: deepvk/USER-bge-m3
      HF_HOME: /models
      AUTO_MIGRATE: "true"
      ADMIN_HOST: 0.0.0.0
      ADMIN_PORT: "8080"
      API_TOKEN: ${API_TOKEN:-}
    volumes:
    - hf_models:/models
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/healthz',timeout=3).status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 600s
    expose:
    - "8080"
volumes:
  qdrant_storage: 
  pgdata: 
  hf_models:
